<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Experiment</title>
    <base href="/" />
    
    <!-- Preconnect to auth provider for faster redirects -->
    <link rel="preconnect" href="https://authentik.becauseimclever.com" crossorigin />
    
    <!-- Preload critical assets for faster FCP -->
    <link rel="preload" href="css/app.css" as="style" />
    <link rel="preload" href="_framework/blazor.webassembly.js" as="script" />
    
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BudgetExperiment.Client.styles.css" rel="stylesheet" />
    
    <!-- Inline theme initialization to prevent FOUC -->
    <script>
        (function() {
            const theme = localStorage.getItem('budget-experiment-theme') || 'system';
            let resolved = theme;
            if (theme === 'system') {
                resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', resolved);
        })();
    </script>
    
    <!-- Inline critical loading styles to avoid FOUC -->
    <style>
        .app-loading-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--color-background, #faf9f8);
            z-index: 9999;
            transition: opacity 0.2s ease-out;
        }
        .app-loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        /* Skeleton layout structure */
        .skeleton-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3.5rem;
            background: var(--color-sidebar-bg, #1e1e2e);
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 0.75rem;
            z-index: 10;
        }
        .skeleton-header-brand {
            width: 160px;
            height: 1.25rem;
            background: var(--color-brand-primary, #0078d4);
            border-radius: 4px;
            opacity: 0.6;
        }
        .skeleton-header-spacer { flex: 1; }
        .skeleton-header-icon {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .skeleton-body {
            display: flex;
            margin-top: 3.5rem;
            height: calc(100vh - 3.5rem);
        }
        .skeleton-sidebar {
            width: 220px;
            background: var(--color-sidebar-bg, #1e1e2e);
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .skeleton-nav-item {
            height: 2.25rem;
            border-radius: 6px;
            background: rgba(255,255,255,0.07);
        }
        .skeleton-nav-item:first-child {
            background: rgba(255,255,255,0.15);
        }
        .skeleton-content {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .skeleton-content-title {
            width: 200px;
            height: 1.5rem;
            border-radius: 4px;
        }
        .skeleton-content-card {
            height: 120px;
            border-radius: 8px;
        }
        .skeleton-content-row {
            display: flex;
            gap: 1rem;
        }
        .skeleton-content-row > div {
            flex: 1;
            height: 80px;
            border-radius: 8px;
        }
        .skeleton-bone {
            background: var(--color-skeleton, #e0e0e0);
            animation: shimmer 1.5s infinite;
        }
        [data-theme="dark"] .skeleton-bone {
            background: #2a2a3e;
        }
        @keyframes shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        @media (max-width: 640px) {
            .skeleton-sidebar { display: none; }
        }
        /* Hide app content until ready */
        #app:not(.ready) {
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }
        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            .skeleton-bone { animation: none; opacity: 0.8; }
            .app-loading-overlay { transition: none; }
        }
        /* Screen reader only text */
        .visually-hidden {
            position: absolute !important;
            width: 1px !important;
            height: 1px !important;
            padding: 0 !important;
            margin: -1px !important;
            overflow: hidden !important;
            clip: rect(0, 0, 0, 0) !important;
            white-space: nowrap !important;
            border: 0 !important;
        }
    </style>
</head>

<body>
    <!-- Skeleton loading overlay - mimics app layout while WASM loads -->
    <div id="app-loading-overlay" class="app-loading-overlay" role="status" aria-live="polite">
        <div class="skeleton-header">
            <div class="skeleton-header-brand"></div>
            <div class="skeleton-header-spacer"></div>
            <div class="skeleton-header-icon"></div>
            <div class="skeleton-header-icon"></div>
        </div>
        <div class="skeleton-body">
            <div class="skeleton-sidebar">
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
                <div class="skeleton-nav-item"></div>
            </div>
            <div class="skeleton-content">
                <div class="skeleton-content-title skeleton-bone"></div>
                <div class="skeleton-content-card skeleton-bone"></div>
                <div class="skeleton-content-row">
                    <div class="skeleton-bone"></div>
                    <div class="skeleton-bone"></div>
                    <div class="skeleton-bone"></div>
                </div>
            </div>
        </div>
        <span class="visually-hidden">Loading application...</span>
    </div>

    <!-- App content - hidden until auth is resolved -->
    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&times;</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <!-- Serve embedded config locally to avoid network round-trip during WASM startup -->
    <script>
        (function() {
            var el = document.getElementById('app-config');
            if (!el) return;
            var json = el.textContent;
            var origFetch = window.fetch;
            window.fetch = function(input, init) {
                if (typeof input === 'string' && (input === 'api/v1/config' || input.endsWith('/api/v1/config'))) {
                    window.fetch = origFetch;
                    return Promise.resolve(new Response(json, {
                        status: 200,
                        headers: { 'Content-Type': 'application/json' }
                    }));
                }
                return origFetch.apply(this, arguments);
            };
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Register service worker for framework asset caching (return visits load from cache)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <script>
        // Hide loading overlay and show app content (called when auth is resolved)
        window.hideLoadingOverlay = function() {
            const overlay = document.getElementById('app-loading-overlay');
            const app = document.getElementById('app');
            
            if (overlay) {
                overlay.classList.add('fade-out');
                // Remove from DOM after transition
                setTimeout(function() { 
                    if (overlay.parentNode) {
                        overlay.parentNode.removeChild(overlay);
                    }
                }, 200);
            }
            
            if (app) {
                app.classList.add('ready');
            }
        };
        
        // Show loading overlay (for re-authentication scenarios)
        window.showLoadingOverlay = function() {
            // Only recreate if not already present
            if (document.getElementById('app-loading-overlay')) {
                return;
            }
            
            var overlay = document.createElement('div');
            overlay.id = 'app-loading-overlay';
            overlay.className = 'app-loading-overlay';
            overlay.setAttribute('role', 'status');
            overlay.setAttribute('aria-live', 'polite');
            overlay.innerHTML =
                '<div class="skeleton-header">' +
                    '<div class="skeleton-header-brand"></div>' +
                    '<div class="skeleton-header-spacer"></div>' +
                    '<div class="skeleton-header-icon"></div>' +
                    '<div class="skeleton-header-icon"></div>' +
                '</div>' +
                '<div class="skeleton-body">' +
                    '<div class="skeleton-sidebar">' +
                        '<div class="skeleton-nav-item"></div>'.repeat(7) +
                    '</div>' +
                    '<div class="skeleton-content">' +
                        '<div class="skeleton-content-title skeleton-bone"></div>' +
                        '<div class="skeleton-content-card skeleton-bone"></div>' +
                        '<div class="skeleton-content-row">' +
                            '<div class="skeleton-bone"></div>' +
                            '<div class="skeleton-bone"></div>' +
                            '<div class="skeleton-bone"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            document.body.insertBefore(overlay, document.body.firstChild);
            
            const app = document.getElementById('app');
            if (app) {
                app.classList.remove('ready');
            }
        };
        
        window.focusElementByTabIndex = function (tabIndex) {
            const element = document.querySelector('[tabindex="' + tabIndex + '"]');
            if (element) {
                element.focus();
            }
        };

        window.focusElement = function (elementId) {
            setTimeout(function() {
                const element = document.getElementById(elementId);
                if (element) {
                    element.focus();
                }
            }, 100);
        };
    </script>
</body>

</html>
