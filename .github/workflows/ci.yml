name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      # Dummy connection string for DI validation (tests use in-memory database)
      ConnectionStrings__AppDb: "Host=localhost;Database=test;Username=test;Password=test"
      # Test-only encryption key so integration test hosts can initialize EncryptionService.
      ENCRYPTION_MASTER_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      # Coverage threshold (line / branch warning)
      COVERAGE_THRESHOLD: '75 90'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore BudgetExperiment.sln

      - name: Build solution
        run: dotnet build BudgetExperiment.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test BudgetExperiment.sln \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~E2E&Category!=Performance" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --logger "trx" \
            --results-directory ./TestResults

      - name: Merge coverage reports
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ./TestResults/**/coverage.cobertura.xml
          targetdir: ./CoverageReport
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary
        if: always()
        run: cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./CoverageReport/Cobertura.xml
          fail_below_min: true
          thresholds: ${{ env.COVERAGE_THRESHOLD }}
          format: markdown
          output: both

      # Restore previous coverage state for retroactive drop detection
      - name: Restore coverage state
        uses: actions/cache@v5
        with:
          path: coverage-state.json
          key: coverage-state-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            coverage-state-${{ github.ref }}-
            coverage-state-refs/heads/main-

      # Per-module coverage validation (Domain 90%, Application 85%, Api 80%, Client 75%, Infrastructure 70%, Contracts 60%)
      # This step parses Cobertura.xml and fails the build if any module drops below its threshold.
      # Prevents "averaging down" where high coverage in one module masks low coverage in another.
      - name: Validate per-module coverage
        id: module_coverage
        if: always()
        shell: pwsh
        run: |
          # Verify Cobertura.xml exists
          if (-not (Test-Path ./CoverageReport/Cobertura.xml)) {
            Write-Error "❌ Cobertura.xml not found at ./CoverageReport/Cobertura.xml"
            Write-Error "Coverage report generation failed. Check 'Merge coverage reports' step output."
            exit 1
          }
          
          # Run validation script and capture output
          try {
            .github/scripts/validate-module-coverage.ps1 `
              -CoberturaPath ./CoverageReport/Cobertura.xml `
              -StatePath ./coverage-state.json `
              -OutputFormat github-markdown | Tee-Object -FilePath module-coverage-results.md
            
            $exitCode = $LASTEXITCODE
          }
          catch {
            Write-Error "❌ Validation script crashed: $_"
            Write-Error $_.ScriptStackTrace
            exit 1
          }
          
          # Output result for workflow
          if ($exitCode -eq 0) {
            "result=success" >> $env:GITHUB_OUTPUT
          } else {
            "result=failure" >> $env:GITHUB_OUTPUT
          }
          
          # Propagate exit code to fail CI if validation failed
          exit $exitCode

      # Save coverage state for next run (only on push events to persist history)
      - name: Save coverage state
        if: github.event_name == 'push' && (success() || failure())
        uses: actions/cache/save@v5
        with:
          path: coverage-state.json
          key: coverage-state-${{ github.ref }}-${{ github.sha }}

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
      
      - name: Add per-module coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request' && always() && steps.module_coverage.outputs.result != ''
        with:
          recreate: false
          append: true
          path: module-coverage-results.md

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ./CoverageReport/Cobertura.xml
          retention-days: 30

      - name: Test Summary
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-empty: false
