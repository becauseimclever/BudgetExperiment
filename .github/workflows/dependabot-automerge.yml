name: Dependabot NuGet Patch Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Enable Auto-Merge (Patch NuGet)
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'security')
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for eligible PRs
        if: >-
          steps.metadata.outputs.package-ecosystem == 'nuget' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch' &&
          !contains(github.event.pull_request.title, 'security')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"