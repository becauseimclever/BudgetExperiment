name: NuGet Upgrade Cycle Audit

on:
  schedule:
    - cron: '0 4 1 * *'
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  nuget-audit:
    name: NuGet Audit and Upgrade Doc
    if: github.event_name != 'pull_request' || (github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      REPOSITORY_ROOT: ${{ github.workspace }}
      SOLUTION_PATH: ${{ github.workspace }}/BudgetExperiment.sln
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/nuget-audit
      PR_BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.repository.default_branch || 'main' }}
      TRIGGER_SOURCE: ${{ github.event_name == 'schedule' && 'schedule' || github.event_name == 'pull_request' && 'dependabot-pr' || 'manual' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Prepare artifact folder
        shell: bash
        run: mkdir -p "${ARTIFACT_DIR}"

      - name: Run NuGet audit commands
        id: nuget_audit
        shell: bash
        run: |
          set +e
          metadata_timestamp_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          metadata_commit_sha="${GITHUB_SHA}"

          pwsh -NoLogo -NoProfile -File "${REPOSITORY_ROOT}/scripts/operations/invoke-nuget-restore-vulnerability-gate.ps1" \
            -SolutionPath "${SOLUTION_PATH}" \
            -LogPath "${ARTIFACT_DIR}/restore-audit.log"
          restore_exit=${PIPESTATUS[0]}

          dotnet list "${SOLUTION_PATH}" package --vulnerable --include-transitive 2>&1 | tee "${ARTIFACT_DIR}/vulnerable-packages.log"
          vulnerable_exit=${PIPESTATUS[0]}

          dotnet list "${SOLUTION_PATH}" package --outdated --include-transitive 2>&1 | tee "${ARTIFACT_DIR}/outdated-packages.log"
          outdated_exit=${PIPESTATUS[0]}

          set -e

          {
            echo "restore_exit=${restore_exit}"
            echo "vulnerable_exit=${vulnerable_exit}"
            echo "outdated_exit=${outdated_exit}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "trigger_source=${TRIGGER_SOURCE}"
            echo "timestamp_utc=${metadata_timestamp_utc}"
            echo "commit_sha=${metadata_commit_sha}"
            echo "restore_exit=${restore_exit}"
            echo "vulnerable_exit=${vulnerable_exit}"
            echo "outdated_exit=${outdated_exit}"
          } > "${ARTIFACT_DIR}/audit-metadata.txt"

      - name: Run package policy gates
        id: package_policy
        shell: bash
        run: |
          set +e
          pwsh -NoLogo -NoProfile -File "${REPOSITORY_ROOT}/scripts/operations/invoke-nuget-package-policy-gates.ps1" \
            -RepositoryRoot "${REPOSITORY_ROOT}" \
            -ArtifactDirectory "${ARTIFACT_DIR}" \
            -StyleCopRegistrationUrl "https://api.nuget.org/v3/registration5-semver2/stylecop.analyzers/index.json" 2>&1 | tee "${ARTIFACT_DIR}/package-policy-run.log"
          policy_exit=${PIPESTATUS[0]}
          set -e

          echo "policy_exit=${policy_exit}" >> "${GITHUB_OUTPUT}"

      - name: Append policy gate metadata
        shell: bash
        run: |
          {
            echo "policy_exit=${{ steps.package_policy.outputs.policy_exit }}"
            echo "prerelease_exit=${{ steps.package_policy.outputs.prerelease_exit }}"
            echo "stylecop_preview_exit=${{ steps.package_policy.outputs.stylecop_preview_exit }}"
          } >> "${ARTIFACT_DIR}/audit-metadata.txt"

      - name: Detect required upgrades from audit outputs
        id: required_upgrades
        shell: bash
        run: |
          vulnerable_signal='false'
          outdated_signal='false'

          if grep -Eq '^\s*>\s' "${ARTIFACT_DIR}/vulnerable-packages.log"; then
            vulnerable_signal='true'
          fi

          if grep -Eq '^\s*>\s' "${ARTIFACT_DIR}/outdated-packages.log"; then
            outdated_signal='true'
          fi

          if [[ "${vulnerable_signal}" == 'true' || "${outdated_signal}" == 'true' ]]; then
            required_upgrades='true'
          else
            required_upgrades='false'
          fi

          {
            echo "vulnerable_signal=${vulnerable_signal}"
            echo "outdated_signal=${outdated_signal}"
            echo "required_upgrades=${required_upgrades}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "vulnerable_signal=${vulnerable_signal}"
            echo "outdated_signal=${outdated_signal}"
            echo "required_upgrades=${required_upgrades}"
          } >> "${ARTIFACT_DIR}/audit-metadata.txt"

      - name: Generate upgrade cycle feature doc
        id: cycle_doc
        if: steps.required_upgrades.outputs.required_upgrades == 'true'
        shell: pwsh
        run: |
          & "${{ github.workspace }}/scripts/operations/new-nuget-upgrade-feature-doc.ps1" `
            -RepositoryRoot "${{ env.REPOSITORY_ROOT }}" `
            -TriggerSource "${{ env.TRIGGER_SOURCE }}" `
            -RequiredUpgradesDetected

      - name: Create pull request for generated cycle doc
        if: steps.required_upgrades.outputs.required_upgrades == 'true' && steps.cycle_doc.outputs.doc_created == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(operations): create NuGet upgrade cycle doc for ${{ steps.cycle_doc.outputs.doc_cycle }}"
          title: "docs: add NuGet upgrade cycle doc for ${{ steps.cycle_doc.outputs.doc_cycle }}"
          body: |
            Automated NuGet upgrade cycle document generated by workflow `${{ github.workflow }}`.

            - Trigger source: `${{ env.TRIGGER_SOURCE }}`
            - Cycle: `${{ steps.cycle_doc.outputs.doc_cycle }}`
            - Generated file: `${{ steps.cycle_doc.outputs.doc_path }}`
            - Required upgrades detected: `${{ steps.required_upgrades.outputs.required_upgrades }}`
          branch: automation/nuget-upgrade-cycle/${{ steps.cycle_doc.outputs.doc_cycle }}
          base: ${{ env.PR_BASE_BRANCH }}
          delete-branch: true
          labels: |
            dependencies
            documentation

      - name: Upload NuGet audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nuget-audit-${{ github.run_number }}
          path: ${{ env.ARTIFACT_DIR }}/
          retention-days: 30

      - name: Fail on audit command errors
        if: steps.nuget_audit.outputs.restore_exit != '0' || steps.nuget_audit.outputs.vulnerable_exit != '0' || steps.nuget_audit.outputs.outdated_exit != '0' || steps.package_policy.outputs.policy_exit != '0' || steps.package_policy.outputs.prerelease_exit != '0' || steps.package_policy.outputs.stylecop_preview_exit != '0'
        shell: bash
        run: |
          echo "NuGet audit or package policy checks failed. See uploaded artifacts for details."
          exit 1